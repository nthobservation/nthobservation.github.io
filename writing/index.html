---
layout: default
title: Index
---

<!-- Wrapper -->
<div id="wrapper">
	<!-- Index of posts -->
	<section id="postindex" class="wrapper style1 fullscreen fade-up">
		<div class="inner">
			<h1>{{ page.title }}</h1>
			<ul class="posts"> {% for post in site.posts %}
				<a href="{{ post.url }}" title="{{ post.title }}">{{ post.title }}</a> {% endfor %} <br>
			</ul>
		</div>
	</section>
</div>
